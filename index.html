<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pokegalaxia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at bottom, #0a001a, #000000);
  color: white;
  overflow: hidden;

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* INTRO */
.intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #1a0033, #000);
  display: flex;
  justify-content: center;
  align-items: center;
  z-index: 999;
  animation: fadeOutIntro 2.5s ease forwards;
}

.intro::after {
  content: "";
  width: 50px;
  height: 50px;
  border-radius: 50%;
  background: #a855f7;
  box-shadow: 0 0 40px #a855f7, 0 0 80px #9333ea;
  animation: portalFlash 1.2s ease forwards;
}

@keyframes portalFlash {
  0% { transform: scale(0.2); }
  50% { transform: scale(6); }
  100% { transform: scale(20); opacity: 0; }
}

@keyframes fadeOutIntro {
  to { opacity: 0; visibility: hidden; }
}

/* CONTENIDO */
.main {
  text-align: center;
  z-index: 2;
  opacity: 0;
  transform: scale(0.8);
  animation: contentIn 1.5s ease 1.5s forwards;
}

@keyframes contentIn {
  to { opacity: 1; transform: scale(1); }
}

/* TITULO */
.title {
  font-size: clamp(50px, 9vw, 110px);
  max-width: 95%;
  margin: auto;
  white-space: nowrap;
  overflow: hidden;

  font-weight: bold;
  color: #c084fc;
  text-shadow:
    0 0 10px #a855f7,
    0 0 25px #9333ea,
    0 0 50px #7e22ce;
}

p { color: #aaa; }

/* BOTÓN */
.btn {
  background: #7e22ce;
  border: none;
  padding: 15px 25px;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 0 20px #7e22ce;
}

/* POPUP */
.popup {
  position: fixed;
  width: 100%;
  height: 100%;
  display: none;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.85);
}

.popup-content {
  background: #14002b;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
}

/* REDES */
.social-bar {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  gap: 15px;
}

.social-btn img {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  animation: rgbGlow 3s linear infinite;
}

@keyframes rgbGlow {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}
</style>
</head>

<body>

<!-- MUSICA -->
<audio id="bgmusic" src="music.mp3" loop></audio>

<div class="intro"></div>

<div class="main">
  <h1 class="title">Pokegalaxia</h1>
  <p>Servidor Pokémon en Minecraft</p>
  <button class="btn" onclick="openPopup()">Entrar</button>
</div>

<div class="popup" id="popup">
  <div class="popup-content">
    <h2>IP del servidor</h2>
    <p>play.pokegalaxia.com:25565</p>
    <button onclick="copyIP()">Copiar IP</button>
    <br><br>
    <button onclick="closePopup()">Cerrar</button>
  </div>
</div>

<div class="social-bar">
  <a href="https://chat.whatsapp.com/KjuKwhgnFQwCvxdgC8jCPa" target="_blank" class="social-btn">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
  </a>

  <a href="https://www.tiktok.com/@neygut1301" target="_blank" class="social-btn">
    <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
  </a>

  <a href="https://discord.gg/ByKusySfA" target="_blank" class="social-btn">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
  </a>
</div>

<script>
const popup = document.getElementById("popup");
const music = document.getElementById("bgmusic");

/* ACTIVAR MÚSICA AL TOCAR */
document.body.addEventListener("click", () => {
  music.play();
}, { once: true });

function openPopup() {
  popup.style.display = "flex";
}

function closePopup() {
  popup.style.display = "none";
}

function copyIP() {
  navigator.clipboard.writeText("play.pokegalaxia.com:25565");
}
</script>

</body>
</html>
