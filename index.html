<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pokegalaxia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at bottom, #0a001a, #000000);
  color: white;
  overflow: hidden;
}

/* Estrellas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}

/* HEADER */
header {
  text-align: center;
  padding: 80px 20px;
  position: relative;
  z-index: 2;
}

/* TITULO */
.title {
  font-size: 10vh;
  font-weight: bold;
  color: #c084fc;
  text-shadow:
    0 0 10px #a855f7,
    0 0 25px #9333ea,
    0 0 50px #7e22ce;
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%,100% { transform: translateY(0);}
  50% { transform: translateY(-12px);}
}

p {
  color: #aaa;
}

/* BOTÓN */
.btn {
  background: #7e22ce;
  border: none;
  padding: 15px 25px;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 0 20px #7e22ce;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 35px #c084fc;
}

/* PORTAL */
.portal {
  position: fixed;
  top: 50%;
  left: 50%;
  width: 0;
  height: 0;
  border-radius: 50%;
  background: radial-gradient(circle, #a855f7, transparent 70%);
  transform: translate(-50%, -50%);
  opacity: 0;
  z-index: 5;
  pointer-events: none;
}

.portal.active {
  animation: portalAbsorb 0.8s ease forwards;
}

@keyframes portalAbsorb {
  0% { width: 0; height: 0; opacity: 0; }
  50% { width: 500px; height: 500px; opacity: 1; }
  100% { width: 2500px; height: 2500px; opacity: 0; }
}

/* POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  visibility: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.85);
  backdrop-filter: blur(6px);
  transition: 0.3s;
  z-index: 10;
}

.popup.active {
  opacity: 1;
  visibility: visible;
}

.popup-content {
  background: #14002b;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 0 40px #9333ea;
}

/* BOTONES SOCIALES */
.social-bar {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  gap: 15px;
  z-index: 20;
}

.social-btn img {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  transition: 0.3s;
  box-shadow: 0 0 15px rgba(0,0,0,0.5);
}

.social-btn img:hover {
  transform: scale(1.2);
  box-shadow: 0 0 25px #a855f7;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>
<div class="portal" id="portal"></div>

<header>
  <h1 class="title">Pokegalaxia</h1>
  <p>Servidor Pokémon en Minecraft</p>
  <button class="btn" onclick="openPopup()">Entrar</button>
</header>

<div class="popup" id="popup">
  <div class="popup-content">
    <h2>IP del servidor</h2>
    <p>play.pokegalaxia.com:25565</p>

    <button class="btn" onclick="copyIP()">Copiar IP</button>
    <br><br>
    <button class="btn" onclick="closePopup()">Cerrar</button>
  </div>
</div>

<!-- BOTONES SOCIALES -->
<div class="social-bar">

  <a href="https://chat.whatsapp.com/KjuKwhgnFQwCvxdgC8jCPa" target="_blank" class="social-btn">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
  </a>

  <a href="https://www.tiktok.com/@neygut1301?_r=1&_t=ZS-95vgJmdJdSM" target="_blank" class="social-btn">
    <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
  </a>

  <a href="https://discord.gg/ByKusySfA" target="_blank" class="social-btn">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
  </a>

</div>

<script>
const popup = document.getElementById("popup");
const portal = document.getElementById("portal");

/* PORTAL */
function openPopup() {
  portal.classList.remove("active");
  void portal.offsetWidth;
  portal.classList.add("active");

  setTimeout(() => {
    popup.classList.add("active");
  }, 400);
}

function closePopup() {
  popup.classList.remove("active");

  setTimeout(() => {
    portal.classList.remove("active");
  }, 800);
}

/* COPIAR IP */
function copyIP() {
  navigator.clipboard.writeText("play.pokegalaxia.com:25565");
}

/* ESTRELLAS */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let stars = [];

for (let i = 0; i < 150; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speed: Math.random() * 0.5
  });
}

function drawStars() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "white";

  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
    ctx.fill();

    s.y += s.speed;
    if (s.y > canvas.height) s.y = 0;
  });

  requestAnimationFrame(drawStars);
}
drawStars();
</script>

</body>
</html>
