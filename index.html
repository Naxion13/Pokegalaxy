<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pokegalaxia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at bottom, #0a001a, #000000);
  color: white;
  overflow: hidden;
}

/* Estrellas */
canvas {
  position: fixed;
  top: 0;
  left: 0;
  pointer-events: none;
}

/* Header */
header {
  text-align: center;
  padding: 80px 20px;
  position: relative;
  z-index: 2;
}

/* LOGO PRO */
.logo {
  width: 260px;
  display: block;
  margin: 0 auto 20px;
  filter: drop-shadow(0 0 25px #a855f7);
  animation: float 4s ease-in-out infinite;
}

@keyframes float {
  0%, 100% { transform: translateY(0);}
  50% { transform: translateY(-12px);}
}

/* Texto secundario */
p {
  color: #aaa;
  font-size: 18px;
}

/* Botón */
.btn {
  background: #7e22ce;
  border: none;
  padding: 15px 25px;
  color: white;
  font-size: 18px;
  border-radius: 10px;
  cursor: pointer;
  box-shadow: 0 0 15px #7e22ce;
  transition: 0.3s;
}

.btn:hover {
  transform: scale(1.1);
  box-shadow: 0 0 30px #c084fc;
}

/* Popup */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  opacity: 0;
  visibility: hidden;
  display: flex;
  justify-content: center;
  align-items: center;
  background: rgba(0,0,0,0.8);
  backdrop-filter: blur(5px);
  transition: 0.3s;
  z-index: 10;
}

.popup.active {
  opacity: 1;
  visibility: visible;
}

.popup-content {
  background: #14002b;
  padding: 30px;
  border-radius: 15px;
  text-align: center;
  box-shadow: 0 0 40px #9333ea;
}

/* Botón copiar */
.copy-btn {
  margin-top: 15px;
  background: #9333ea;
  border: none;
  padding: 10px 20px;
  border-radius: 8px;
  color: white;
  cursor: pointer;
}

.copy-btn.glow {
  box-shadow: 0 0 20px #fff, 0 0 40px #a855f7;
}
</style>
</head>

<body>

<canvas id="stars"></canvas>

<header>
  <!-- SOLO LOGO (quitamos texto grande para que se vea pro) -->
  <img src="logo.png" class="logo" alt="Pokegalaxia">

  <p>Servidor Pokémon en Minecraft</p>

  <button class="btn" onclick="openPopup()">Entrar</button>
</header>

<div class="popup" id="popup">
  <div class="popup-content">
    <h2>IP del servidor</h2>
    <p>play.pokegalaxia.com:25565</p>

    <button class="copy-btn" onclick="copyIP()">Copiar IP</button>
    <br><br>
    <button class="btn" onclick="closePopup()">Cerrar</button>
  </div>
</div>

<audio id="music" loop>
  <source src="space.mp3" type="audio/mpeg">
</audio>

<script>
/* Música */
document.addEventListener("click", () => {
  const m = document.getElementById("music");
  if (m.paused) m.play().catch(()=>{});
}, { once: true });

/* Popup */
const popup = document.getElementById("popup");

function openPopup() {
  popup.classList.add("active");
}

function closePopup() {
  popup.classList.remove("active");
}

popup.addEventListener("click", (e) => {
  if (e.target === popup) closePopup();
});

/* Copiar IP */
function copyIP() {
  const ip = "play.pokegalaxia.com:25565";

  navigator.clipboard.writeText(ip).then(() => {
    const btn = document.querySelector(".copy-btn");
    btn.innerText = "Copiado";
    btn.classList.add("glow");

    setTimeout(() => {
      btn.innerText = "Copiar IP";
      btn.classList.remove("glow");
    }, 1200);
  });
}

/* Estrellas */
const canvas = document.getElementById("stars");
const ctx = canvas.getContext("2d");

function resize() {
  canvas.width = window.innerWidth;
  canvas.height = window.innerHeight;
}
resize();
window.addEventListener("resize", resize);

let stars = [];

for (let i = 0; i < 150; i++) {
  stars.push({
    x: Math.random() * canvas.width,
    y: Math.random() * canvas.height,
    size: Math.random() * 2,
    speed: Math.random() * 0.5
  });
}

function drawStars() {
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "white";

  stars.forEach(s => {
    ctx.beginPath();
    ctx.arc(s.x, s.y, s.size, 0, Math.PI*2);
    ctx.fill();

    s.y += s.speed;
    if (s.y > canvas.height) s.y = 0;
  });

  requestAnimationFrame(drawStars);
}
drawStars();
</script>

</body>
</html>
