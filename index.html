<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>Pokegalaxia</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background: radial-gradient(circle at bottom, #0a001a, #000);
  color: white;
  overflow: hidden;

  display: flex;
  justify-content: center;
  align-items: center;
  height: 100vh;
}

/* INTRO */
.intro {
  position: fixed;
  width: 100%;
  height: 100%;
  background: radial-gradient(circle, #1a0033, #000);
  z-index: 999;
  animation: fadeOut 2.5s forwards;
}

@keyframes fadeOut {
  to { opacity: 0; visibility: hidden; }
}

/* CONTENIDO */
.main {
  text-align: center;
  z-index: 2;
  opacity: 0;
  transform: scale(0.8);
  animation: aparecer 1.5s 1.5s forwards;
}

@keyframes aparecer {
  to { opacity: 1; transform: scale(1); }
}

/* TITULO */
.title {
  font-size: clamp(50px, 9vw, 100px);
  max-width: 95%;
  margin: auto;
  white-space: nowrap;

  color: #c084fc;
  text-shadow: 0 0 20px #9333ea;
}

/* BOTON */
.btn {
  margin-top: 20px;
  background: #7e22ce;
  border: none;
  padding: 15px 25px;
  color: white;
  border-radius: 10px;
  cursor: pointer;
  z-index: 1;
}

/* POPUP */
.popup {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;

  display: flex;
  justify-content: center;
  align-items: center;

  background: rgba(0,0,0,0.85);

  opacity: 0;
  pointer-events: none;
  transition: 0.3s;

  z-index: 9999;
}

.popup.active {
  opacity: 1;
  pointer-events: all;
}

.popup-content {
  background: #14002b;
  padding: 25px;
  border-radius: 15px;
  text-align: center;

  width: 80%;
  max-width: 320px;

  box-shadow: 0 0 40px #9333ea;

  transform: scale(0.8);
  transition: 0.3s;
}

.popup.active .popup-content {
  transform: scale(1);
}

/* REDES */
.social-bar {
  position: fixed;
  bottom: 20px;
  right: 20px;
  display: flex;
  gap: 15px;
}

.social-btn img {
  width: 45px;
  height: 45px;
  border-radius: 50%;
  animation: rgb 3s linear infinite;
}

@keyframes rgb {
  0% { filter: hue-rotate(0deg); }
  100% { filter: hue-rotate(360deg); }
}
</style>
</head>

<body>

<!-- MUSICA -->
<audio id="music" src="music.mp3" loop></audio>

<div class="intro"></div>

<div class="main">
  <h1 class="title">Pokegalaxia</h1>
  <p>Servidor Pokémon en Minecraft</p>
  <button class="btn" onclick="openPopup()">Entrar</button>
</div>

<div class="popup" id="popup">
  <div class="popup-content">
    <h2>IP del servidor</h2>
    <p>play.pokegalaxia.com:25565</p>
    <button onclick="copyIP()">Copiar IP</button>
    <br><br>
    <button onclick="closePopup()">Cerrar</button>
  </div>
</div>

<div class="social-bar">
  <a href="https://chat.whatsapp.com/KjuKwhgnFQwCvxdgC8jCPa" target="_blank" class="social-btn">
    <img src="https://cdn-icons-png.flaticon.com/512/733/733585.png">
  </a>

  <a href="https://www.tiktok.com/@neygut1301" target="_blank" class="social-btn">
    <img src="https://cdn-icons-png.flaticon.com/512/3046/3046121.png">
  </a>

  <a href="https://discord.gg/ByKusySfA" target="_blank" class="social-btn">
    <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png">
  </a>
</div>

<script>
const popup = document.getElementById("popup");
const music = document.getElementById("music");

/* ACTIVAR MUSICA AL TOCAR */
document.body.addEventListener("click", () => {
  music.play();
}, { once: true });

function openPopup() {
  popup.classList.add("active");
}

function closePopup() {
  popup.classList.remove("active");
}

function copyIP() {
  navigator.clipboard.writeText("play.pokegalaxia.com:25565");
}
</script>

</body>
</html>
